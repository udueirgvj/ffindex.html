<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>F16 Flight Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(#6ec6ff,#e0f7ff);
    touch-action:none;
}

/* joystick */
#joy{
    position:fixed;
    bottom:40px;
    left:40px;
    width:140px;
    height:140px;
    border-radius:50%;
    background:rgba(0,0,0,0.25);
}

#stick{
    position:absolute;
    width:70px;
    height:70px;
    border-radius:50%;
    background:rgba(255,255,255,0.8);
    left:35px;
    top:35px;
}

/* HUD */
#hud{
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    font-size:18px;
    font-weight:bold;
    text-shadow:0 0 5px black;
}
</style>
</head>

<body>

<div id="hud">السرعة: 0</div>
<div id="joy"><div id="stick"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// scene
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 200, 1200);

// camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
camera.position.set(0,8,20);

// renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// light
const sun = new THREE.DirectionalLight(0xffffff,1.2);
sun.position.set(100,200,100);
scene.add(sun);

// ground
const groundGeo = new THREE.PlaneGeometry(4000,4000);
const groundMat = new THREE.MeshLambertMaterial({color:0x2e7d32});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// buildings (مدن)
function building(x,z){
    const h = 20 + Math.random()*120;
    const geo = new THREE.BoxGeometry(20,h,20);
    const mat = new THREE.MeshLambertMaterial({color:0xb0bec5});
    const b = new THREE.Mesh(geo,mat);
    b.position.set(x,h/2,z);
    scene.add(b);
}

for(let i=0;i<250;i++){
    building(
        Math.random()*3000-1500,
        Math.random()*3000-1500
    );
}

// F16 (طائرة)
const jet = new THREE.Group();

// body
const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.7,1.2,8,12),
    new THREE.MeshPhongMaterial({color:0x9e9e9e})
);
body.rotation.z=Math.PI/2;
jet.add(body);

// wings
const wing = new THREE.Mesh(
    new THREE.BoxGeometry(8,0.2,2),
    new THREE.MeshPhongMaterial({color:0x616161})
);
jet.add(wing);

// tail
const tail = new THREE.Mesh(
    new THREE.BoxGeometry(2,1.5,0.2),
    new THREE.MeshPhongMaterial({color:0x757575})
);
tail.position.set(-3,1,0);
jet.add(tail);

scene.add(jet);

// joystick
const joy=document.getElementById("joy");
const stick=document.getElementById("stick");
let joyX=0,joyY=0,active=false;

joy.addEventListener("touchstart",()=>active=true);

joy.addEventListener("touchmove",e=>{
    if(!active)return;
    const rect=joy.getBoundingClientRect();
    const x=e.touches[0].clientX-rect.left-70;
    const y=e.touches[0].clientY-rect.top-70;

    joyX=Math.max(-40,Math.min(40,x));
    joyY=Math.max(-40,Math.min(40,y));

    stick.style.left=(35+joyX)+"px";
    stick.style.top=(35+joyY)+"px";
});

joy.addEventListener("touchend",()=>{
    active=false;
    joyX=0;joyY=0;
    stick.style.left="35px";
    stick.style.top="35px";
});

// movement
let speed=0;
const hud=document.getElementById("hud");

function animate(){
    requestAnimationFrame(animate);

    speed+=0.02;
    if(speed>2.5)speed=2.5;

    jet.rotation.z=-joyX*0.01;
    jet.rotation.x=joyY*0.01;

    jet.position.x += Math.sin(jet.rotation.y)*speed + joyX*0.05;
    jet.position.y -= joyY*0.1;
    jet.position.z -= Math.cos(jet.rotation.y)*speed;

    camera.position.lerp(new THREE.Vector3(
        jet.position.x,
        jet.position.y+8,
        jet.position.z+20
    ),0.08);

    camera.lookAt(jet.position);

    hud.innerHTML="السرعة: "+(speed*100).toFixed(0);

    renderer.render(scene,camera);
}
animate();

// resize
window.addEventListener("resize",()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
