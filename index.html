<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة الطائرة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div class="ui-panel">
            <div class="score">النقاط: <span id="scoreValue">0</span></div>
            <div class="speed-control">
                <label for="speedSlider">السرعة:</label>
                <input type="range" id="speedSlider" min="2" max="15" value="7" step="0.5">
                <span id="speedValue">7.0</span>
            </div>
            <button id="restartBtn">إعادة تشغيل</button>
        </div>
    </div>

    <!-- استيراد وحدات JavaScript (باستخدام type="module") -->
    <script type="module" src="js/game.js"></script>
</body>
</html>
